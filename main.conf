#!MANAGED-CONFIG https://raw.githubusercontent.com/你的用户名/surge-config/main/main.conf interval=86400 strict=false

[General]
loglevel = notify
ipv6 = false
show-error-page-for-reject = true
exclude-simple-hostnames = true

[Proxy]

[Proxy Group]
全部节点 = select, policy-path=你的机场订阅链接, update-interval=86400
自动选择 = url-test, include-other-group=全部节点, test-url=http://www.gstatic.com/generate_204, interval=600

办公沟通 = select, 自动选择, include-other-group=全部节点
跨境电商 = select, include-other-group=全部节点
支付金融 = select, include-other-group=全部节点
国外媒体 = select, 自动选择, include-other-group=全部节点
兜底策略 = select, 自动选择, DIRECT, include-other-group=全部节点

[Rule]
RULE-SET,LAN,DIRECT
AND,((PROTOCOL,UDP),(DEST-PORT,123)),DIRECT

RULE-SET,https://raw.githubusercontent.com/你的用户名/surge-config/main/rules/current/office-communication.list,办公沟通,no-resolve,extended-matching
RULE-SET,https://raw.githubusercontent.com/你的用户名/surge-config/main/rules/current/cross-border-ecommerce.list,跨境电商,no-resolve,extended-matching
RULE-SET,https://raw.githubusercontent.com/你的用户名/surge-config/main/rules/current/payments-finance.list,支付金融,no-resolve,extended-matching
RULE-SET,https://raw.githubusercontent.com/你的用户名/surge-config/main/rules/current/custom-proxy.list,国外媒体,no-resolve,extended-matching

GEOIP,CN,DIRECT
FINAL,兜底策略
